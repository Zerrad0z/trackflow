spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  rabbitmq:
    addresses: ${SPRING_RABBITMQ_ADDRESSES}
    port: 5671

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET}

groq:
  api:
    key: ${GROQ_API_KEY}
    url: ${GROQ_API_URL}
    model: ${GROQ_API_MODEL}

management:
  health:
    rabbit:
      enabled: false

logging:
  level:
    com.trackflow: INFO
    org.springframework.security: WARN