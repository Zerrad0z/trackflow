spring:
  application:
    name: trackflow-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/trackflow
    username: trackflow
    password: trackflow
    driver-class-name: org.postgresql.Driver
    hikari:
      max-lifetime: 600000
      keepalive-time: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  mail:
    host: ${MAIL_HOST:sandbox.smtp.mailtrap.io}
    port: ${MAIL_PORT:2525}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  storage:
    upload-dir: uploads/forms
    reports-dir: uploads/reports

jwt:
  secret: ${JWT_SECRET:trackflow-secret-key-change-in-production}
  expiration: 86400000

server:
  port: 8080
  servlet:
    context-path: /api/v1

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    operations-sorter: method

logging:
  level:
    com.trackflow: DEBUG
    org.springframework.security: INFO